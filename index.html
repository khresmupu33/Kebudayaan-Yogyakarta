<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogja Culture - Welcome</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

    <style>
        /* Variabel Warna sesuai Tema Utama */
        :root {
            --brown-mid: #6B3A1F; /* Cokelat latar belakang gambar */
            --cream: #ffffff;    /* Putih krem Jogja */
            --gold: #d4a250;     /* Emas Culture */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--brown-mid);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Playfair Display', serif;
        }

        /* --- CONTAINER UTAMA INTRO --- */
        .intro-container {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--brown-mid);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            /* Perubahan: Efek keluar menggunakan opacity fade-out yang tenang */
            transition: opacity 1.5s cubic-bezier(0.25, 1, 0.5, 1);
            opacity: 1;
        }

        /* Saat keluar, latar belakang cokelat memudar transparan di tempat, tidak geser kiri */
        .intro-container.slide-out {
            opacity: 0;
            pointer-events: none;
        }

        /* --- STYLE TEKS LOGO --- */
        .logo-intro {
            font-size: 3.5rem;
            letter-spacing: 2px;
            display: flex;
            user-select: none;
            margin-bottom: 20px;
        }

        /* Bagian kata "Jogja" (Putih) */
        .text-jogja {
            color: var(--cream);
            font-weight: 400;
            display: inline-block;
            transition: transform 1.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 1.5s ease;
        }

        /* Bagian kata "Culture" (Emas & Italic) */
        .text-culture {
            color: var(--gold);
            font-style: italic;
            font-weight: 400;
            display: inline-block;
            transition: transform 1.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 1.5s ease;
        }

        /* --- LOGIKA PERGESERAN KATA PASCA LOADING --- */
        .intro-container.split-active .text-jogja {
            transform: translateX(-250px); /* Hanya kata Jogja meluncur ke kiri jauh */
            opacity: 0;
        }

        .intro-container.split-active .text-culture {
            transform: translateX(250px); /* Hanya kata Culture meluncur ke kanan jauh */
            opacity: 0;
        }

        /* --- ANIMASI LOADING PROGRESS BAR --- */
        .loading-bar-container {
            width: 150px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .loading-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0;
            background-color: var(--gold);
        }

        .loading-active .loading-bar-container {
            opacity: 1;
        }

        .loading-active .loading-bar {
            animation: jalanLoading 3s linear forwards;
        }

        @keyframes jalanLoading {
            0% { width: 0; }
            100% { width: 100%; }
        }

        /* Garis loading ikut memudar saat teks membelah */
        .intro-container.split-active .loading-bar-container {
            opacity: 0;
            transform: scaleX(0.5);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        /* --- ANIMASI PER HURUF --- */
        .char {
            opacity: 0;
            display: inline-block;
            transform: translateY(10px);
            animation: munculHuruf 0.4s ease forwards;
        }

        @keyframes munculHuruf {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Responsive teks untuk HP */
        @media (max-width: 640px) {
            .logo-intro {
                font-size: 2.2rem;
            }
            .loading-bar-container {
                width: 100px;
            }
            .intro-container.split-active .text-jogja {
                transform: translateX(-100px);
            }
            .intro-container.split-active .text-culture {
                transform: translateX(100px);
            }
        }
    </style>
</head>
<body>

    <div class="intro-container" id="introLayer">
        <h1 class="logo-intro" id="typingLogo"></h1>
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById("introLayer");
            const logoContainer = document.getElementById("typingLogo");
            
            const kata1 = "Jogja".split("");
            const kata2 = "Culture".split("");
            
            let delayAkumulasi = 0; 
            const kecepatanKetik = 120; 

            // 1. Cetak kata "Jogja"
            const spanJogja = document.createElement("span");
            spanJogja.className = "text-jogja";
            kata1.forEach((huruf) => {
                const charSpan = document.createElement("span");
                charSpan.className = "char";
                charSpan.innerHTML = huruf === " " ? "&nbsp;" : huruf;
                charSpan.style.animationDelay = `${delayAkumulasi}ms`;
                spanJogja.appendChild(charSpan);
                delayAkumulasi += kecepatanKetik;
            });
            logoContainer.appendChild(spanJogja);

            // 2. Cetak kata "Culture"
            const spanCulture = document.createElement("span");
            spanCulture.className = "text-culture";
            kata2.forEach((huruf) => {
                const charSpan = document.createElement("span");
                charSpan.className = "char";
                charSpan.innerHTML = huruf === " " ? "&nbsp;" : huruf;
                charSpan.style.animationDelay = `${delayAkumulasi}ms`;
                spanCulture.appendChild(charSpan);
                delayAkumulasi += kecepatanKetik;
            });
            logoContainer.appendChild(spanCulture);

            const totalDurasiKetik = delayAkumulasi + 300; 

            setTimeout(() => {
                // TAHAP 1: Jalankan progress loading bar selama 3 detik
                container.classList.add("loading-active");

                // TAHAP 2: Kunci jeda diam 3 detik setelah loading selesai
                setTimeout(() => {
                    
                    // TAHAP 3: Memicu pemisahan kata (Jogja ke kiri, Culture ke kanan) secara simultan bersama memudarnya latar
                    container.classList.add("split-active");
                    container.classList.add("slide-out");

                    // TAHAP 4: Tunggu durasi transisi 1.5 detik hingga layar bersih total, baru lempar halaman
                    setTimeout(() => {
                        window.location.href = "halaman-beranda.html"; 
                    }, 1500);

                }, 3000); 

            }, totalDurasiKetik);
        });
    </script>
</body>
</html>
